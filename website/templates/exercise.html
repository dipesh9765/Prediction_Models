{% extends 'base.html' %}
{% block title %}Calorie Burnt Predictor{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-9 col-lg-7">
    <div class="glass-card">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-white bg-opacity-10 rounded-circle text-primary mb-3" style="width: 80px; height: 80px;">
            <i class="fa-solid fa-fire-flame-curved fa-2x"></i>
        </div>
        <h2 class="fw-bold mb-2">Calorie Burnt Predictor</h2>
        <p style="color: #cbd5e1;">Estimate calories burnt based on your physical attributes and exercise activity.</p>
      </div>

      <form action="{{ url_for('views.e_predict') }}" method="post">
        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Gender</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-venus-mars"></i>
              <select class="form-select" name="GENDER3" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="0">Male</option>
                <option value="1">Female</option>
              </select>
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Age</label>
            <div class="input-icon-wrapper">
              <i class="fa-regular fa-id-card"></i>
              <input type="number" class="form-control" name="AGE3" placeholder="Age in years" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Height (cm)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-text-height"></i>
              <input type="number" step="any" class="form-control" name="HEIGHT3" placeholder="e.g. 175" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Weight (kg)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-weight-scale"></i>
              <input type="number" step="any" class="form-control" name="WEIGHT3" placeholder="e.g. 70" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Duration (min)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-stopwatch"></i>
              <input type="number" step="any" class="form-control" name="DUR3" placeholder="Exercise duration" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Heart Rate (bpm)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-heart-pulse"></i>
              <input type="number" step="any" class="form-control" name="HR3" placeholder="e.g. 120" required="required" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Body Temperature (&deg;C)</label>
          <div class="input-icon-wrapper">
            <i class="fa-solid fa-temperature-half"></i>
            <input type="number" step="any" class="form-control" name="BT3" placeholder="e.g. 37.5" required="required" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary mt-3">
          <i class="fa-solid fa-calculator me-2"></i> Calculate Calories
        </button>
      </form>

      {% if prediction_text %}
      <div class="prediction-result mt-4">
        <h3>{{ prediction_text }}</h3>
      </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
