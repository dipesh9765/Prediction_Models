{% extends 'base.html' %}
{% block title %}Medical Insurance Predictor{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-9 col-lg-7">
    <div class="glass-card">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-white bg-opacity-10 rounded-circle text-primary mb-3" style="width: 80px; height: 80px;">
            <i class="fa-solid fa-file-medical fa-2x"></i>
        </div>
        <h2 class="fw-bold mb-2">Medical Insurance Predictor</h2>
        <p style="color: #cbd5e1;">Estimate insurance charges based on your profile.</p>
      </div>

      <form action="{{ url_for('views.m_predict') }}" method="post">
        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Age</label>
            <div class="input-icon-wrapper">
              <i class="fa-regular fa-id-card"></i>
              <input type="number" class="form-control" name="AGE5" placeholder="Age in years" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Gender</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-venus-mars"></i>
              <select class="form-select" name="SEX5" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="0">Female</option>
                <option value="1">Male</option>
              </select>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">BMI</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-weight-scale"></i>
              <input type="number" step="any" class="form-control" name="BMI5" placeholder="Body Mass Index" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Number of Children</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-children"></i>
              <input type="number" class="form-control" name="CHILDREN" placeholder="Number of dependents" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Smoker?</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-smoking"></i>
              <select class="form-select" name="SMOKER" required>
                <option value="" disabled selected>Do you smoke?</option>
                <option value="0">Yes</option>
                <option value="1">No</option>
              </select>
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Region</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-map-location-dot"></i>
              <select class="form-select" name="REG5" required>
                <option value="" disabled selected>Select Region</option>
                <option value="0">West</option>
                <option value="1">East</option>
                <option value="2">North</option>
                <option value="3">South</option>
              </select>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary mt-3">
          <i class="fa-solid fa-file-invoice-dollar me-2"></i> Predict Charges
        </button>
      </form>

      {% if prediction_text %}
      <div class="prediction-result mt-4">
        <h3>{{ prediction_text }}</h3>
      </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
