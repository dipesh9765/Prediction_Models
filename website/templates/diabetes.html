{% extends 'base.html' %}
{% block title %}Diabetes Risk Predictor{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-9 col-lg-7">
    <div class="glass-card">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-white bg-opacity-10 rounded-circle text-primary mb-3" style="width: 80px; height: 80px;">
            <i class="fa-solid fa-notes-medical fa-2x"></i>
        </div>
        <h2 class="fw-bold mb-2">Diabetes Risk Predictor</h2>
        <p style="color: #cbd5e1;">Analyze health metrics to assess diabetes risk.</p>
      </div>

      <form action="{{ url_for('views.d_predict') }}" method="post">
        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Pregnancies (Count)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-baby"></i>
              <input type="number" class="form-control" name="PREG" placeholder="e.g. 1" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Glucose Level (mg/dL)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-cubes-stacked"></i>
              <input type="number" step="any" class="form-control" name="GLU" placeholder="e.g. 120" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Blood Pressure (mm Hg)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-heart-pulse"></i>
              <input type="number" step="any" class="form-control" name="BP2" placeholder="Diastolic BP" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Skin Thickness (mm)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-ruler-vertical"></i>
              <input type="number" step="any" class="form-control" name="ST2" placeholder="Triceps skin fold" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Insulin Level (mu U/ml)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-syringe"></i>
              <input type="number" step="any" class="form-control" name="INSULIN2" placeholder="Serum insulin" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">BMI</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-weight-scale"></i>
              <input type="number" step="any" class="form-control" name="BMI2" placeholder="Body Mass Index" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Diabetes Pedigree</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-dna"></i>
              <input type="number" step="any" class="form-control" name="DPF" placeholder="e.g. 0.5 [0-2.5]" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Age</label>
            <div class="input-icon-wrapper">
              <i class="fa-regular fa-id-card"></i>
              <input type="number" class="form-control" name="AGE2" placeholder="Age in years" required="required" />
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary mt-3">
          <i class="fa-solid fa-stethoscope me-2"></i> Evaluate Risk
        </button>
      </form>

      {% if prediction_text %}
      <div class="prediction-result mt-4">
        <h3>{{ prediction_text }}</h3>
      </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
