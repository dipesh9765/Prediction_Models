{% extends 'base.html' %}
{% block title %}Car Price Prediction{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-9 col-lg-7">
    <div class="glass-card">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-white bg-opacity-10 rounded-circle text-primary mb-3" style="width: 80px; height: 80px;">
            <i class="fa-solid fa-car-side fa-2x"></i>
        </div>
        <h2 class="fw-bold mb-2">Car Price Predictor</h2>
        <p style="color: #cbd5e1;">Enter car details to estimate its selling price.</p>
      </div>

      <form action="{{ url_for('views.c_predict') }}" method="post">
        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Year of Purchase</label>
            <div class="input-icon-wrapper">
              <i class="fa-regular fa-calendar"></i>
              <input type="number" class="form-control" name="YEAR1" placeholder="e.g. 2015" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Present Price (Lakhs)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-tag"></i>
              <input type="number" step="any" class="form-control" name="PP" placeholder="e.g. 5.5" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Kilometers Driven</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-gauge"></i>
              <input type="number" class="form-control" name="KmD" placeholder="e.g. 27000" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Fuel Type</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-gas-pump"></i>
              <select class="form-select" name="FT" required>
                <option value="" disabled selected>Select Fuel Type</option>
                <option value="0">Petrol</option>
                <option value="1">Diesel</option>
                <option value="2">CNG</option>
              </select>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Seller Type</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-user-tag"></i>
              <select class="form-select" name="ST" required>
                <option value="" disabled selected>Select Seller</option>
                <option value="0">Dealer</option>
                <option value="1">Individual</option>
              </select>
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Transmission</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-gear"></i>
              <select class="form-select" name="TMS" required>
                <option value="" disabled selected>Select Transmission</option>
                <option value="0">Manual</option>
                <option value="1">Automatic</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Number of Owners</label>
          <div class="input-icon-wrapper">
            <i class="fa-solid fa-users"></i>
            <input type="number" class="form-control" name="OWN" placeholder="e.g. 0 (First Owner)" required="required" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary mt-4">
          <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Predict Price
        </button>
      </form>

      {% if prediction_text %}
      <div class="prediction-result mt-4">
        <h3>{{ prediction_text }}</h3>
      </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
