{% extends 'base.html' %}
{% block title %}House Price Predictor{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-10 col-lg-8">
    <div class="glass-card">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-white bg-opacity-10 rounded-circle text-primary mb-3" style="width: 80px; height: 80px;">
            <i class="fa-solid fa-house-chimney fa-2x"></i>
        </div>
        <h2 class="fw-bold mb-2">Boston House Price Predictor</h2>
        <p style="color: #cbd5e1;">Enter area details to estimate the property value.</p>
      </div>

      <form action="{{ url_for('views.predict') }}" method="post">
        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Crime Rate (CRIM)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-handcuffs"></i>
              <input type="number" step="any" class="form-control" name="CRIM" placeholder="Per capita crime rate" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Zoning (ZN)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-map"></i>
              <input type="number" step="any" class="form-control" name="ZN" placeholder="Residential land proportion" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Industry Prop (INDUS)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-industry"></i>
              <input type="number" step="any" class="form-control" name="INDUS" placeholder="Non-retail business acres" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Charles River (CHAS)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-water"></i>
              <select class="form-select" name="CHAS" required>
                <option value="" disabled selected>Bounds River?</option>
                <option value="1">Yes (1)</option>
                <option value="0">No (0)</option>
              </select>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Nitric Oxides (NOX)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-cloud"></i>
              <input type="number" step="any" class="form-control" name="NOX" placeholder="Concentration" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Rooms (RM)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-door-open"></i>
              <input type="number" step="any" class="form-control" name="RM4" placeholder="Average rooms per dwelling" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Age (AGE)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-clock-rotate-left"></i>
              <input type="number" step="any" class="form-control" name="Age4" placeholder="Prop built prior to 1940" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Distance (DIS)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-route"></i>
              <input type="number" step="any" class="form-control" name="DIS" placeholder="Weighted distance to centres" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 form-group">
            <label class="form-label">Highways Access (RAD)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-road"></i>
              <input type="number" step="any" class="form-control" name="RAD" placeholder="Accessibility index" required="required" />
            </div>
          </div>
          <div class="col-md-6 form-group">
            <label class="form-label">Tax Rate (TAX)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-file-invoice-dollar"></i>
              <input type="number" step="any" class="form-control" name="TAX" placeholder="Property-tax rate" required="required" />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 form-group">
            <label class="form-label">Pupil-Teacher Ratio</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-chalkboard-user"></i>
              <input type="number" step="any" class="form-control" name="PTRATIO" placeholder="Ratio by town" required="required" />
            </div>
          </div>
          <div class="col-md-4 form-group">
            <label class="form-label">B (Black Prop)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-users-viewfinder"></i>
              <input type="number" step="any" class="form-control" name="B" placeholder="1000(Bk - 0.63)^2" required="required" />
            </div>
          </div>
          <div class="col-md-4 form-group">
            <label class="form-label">Lower Status (LSTAT)</label>
            <div class="input-icon-wrapper">
              <i class="fa-solid fa-arrow-trend-down"></i>
              <input type="number" step="any" class="form-control" name="LSTAT" placeholder="% of population" required="required" />
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary mt-3">
          <i class="fa-solid fa-house-circle-check me-2"></i> Estimate House Price
        </button>
      </form>

      {% if prediction_text %}
      <div class="prediction-result mt-4">
        <h3>{{ prediction_text }}</h3>
      </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
