<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Price Predictor | Prediction Models</title>
  <meta name="description" content="Predict car selling prices using our AI-powered machine learning model.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

  <div class="app-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <nav class="glass-nav mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="fa-solid fa-brain me-2 brand-icon"></i>
        <span class="brand-text">Prediction Models</span>
      </a>
      <a href="index.html" class="btn-outline-light">Home</a>
    </div>
  </nav>

  <main class="container py-4 fade-in">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">
        <div class="glass-card">

          <div class="text-center mb-4">
            <div class="icon-circle">
              <i class="fa-solid fa-car-side fa-2x"></i>
            </div>
            <h2 class="fw-bold mb-2">Car Price Predictor</h2>
            <p style="color: #cbd5e1;">Enter car details to estimate its selling price.</p>
          </div>

          <form id="carForm">
            <div class="row">
              <div class="col-md-6 form-group">
                <label class="form-label">Year of Purchase</label>
                <div class="input-icon-wrapper">
                  <i class="fa-regular fa-calendar"></i>
                  <input type="number" class="form-control" name="YEAR1" placeholder="e.g. 2015" required />
                </div>
              </div>
              <div class="col-md-6 form-group">
                <label class="form-label">Present Price (Lakhs)</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-tag"></i>
                  <input type="number" step="any" class="form-control" name="PP" placeholder="e.g. 5.5" required />
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 form-group">
                <label class="form-label">Kilometers Driven</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-gauge"></i>
                  <input type="number" class="form-control" name="KmD" placeholder="e.g. 27000" required />
                </div>
              </div>
              <div class="col-md-6 form-group">
                <label class="form-label">Fuel Type</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-gas-pump"></i>
                  <select class="form-select" name="FT" required>
                    <option value="" disabled selected>Select Fuel Type</option>
                    <option value="0">Petrol</option>
                    <option value="1">Diesel</option>
                    <option value="2">CNG</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 form-group">
                <label class="form-label">Seller Type</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-user-tag"></i>
                  <select class="form-select" name="ST" required>
                    <option value="" disabled selected>Select Seller</option>
                    <option value="0">Dealer</option>
                    <option value="1">Individual</option>
                  </select>
                </div>
              </div>
              <div class="col-md-6 form-group">
                <label class="form-label">Transmission</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-gear"></i>
                  <select class="form-select" name="TMS" required>
                    <option value="" disabled selected>Select Transmission</option>
                    <option value="0">Manual</option>
                    <option value="1">Automatic</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Number of Owners</label>
              <div class="input-icon-wrapper">
                <i class="fa-solid fa-users"></i>
                <input type="number" class="form-control" name="OWN" placeholder="e.g. 0 (First Owner)" required />
              </div>
            </div>

            <button type="submit" class="btn-primary mt-4" id="submitBtn">
              <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Predict Price
            </button>
          </form>

          <div id="resultBox"></div>

        </div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = 'https://prediction-models-g1sm.onrender.com';

    document.getElementById('carForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const resultBox = document.getElementById('resultBox');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Predicting...';
      resultBox.innerHTML = '';

      const formData = new FormData(this);

      try {
        const response = await fetch(`${API_BASE}/c_predict`, {
          method: 'POST',
          body: formData
        });
        const data = await response.json();

        if (data.prediction_text) {
          resultBox.innerHTML = `
            <div class="prediction-result mt-4">
              <h3>${data.prediction_text}</h3>
            </div>`;
        } else if (data.error) {
          resultBox.innerHTML = `<div class="prediction-error mt-4"><h3>⚠️ ${data.error}</h3></div>`;
        }
      } catch (err) {
        resultBox.innerHTML = `<div class="prediction-error mt-4"><h3>⚠️ Could not reach the API. Please try again.</h3></div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles me-2"></i> Predict Price';
      }
    });
  </script>

</body>
</html>
