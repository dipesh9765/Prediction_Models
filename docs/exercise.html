<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calorie Burnt Predictor | Prediction Models</title>
  <meta name="description" content="Predict calories burnt during exercise based on your physical attributes using AI.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

  <div class="app-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <nav class="glass-nav mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="fa-solid fa-brain me-2 brand-icon"></i>
        <span class="brand-text">Prediction Models</span>
      </a>
      <a href="index.html" class="btn-outline-light">Home</a>
    </div>
  </nav>

  <main class="container py-4 fade-in">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">
        <div class="glass-card">

          <div class="text-center mb-4">
            <div class="icon-circle">
              <i class="fa-solid fa-fire-flame-curved fa-2x"></i>
            </div>
            <h2 class="fw-bold mb-2">Calorie Burnt Predictor</h2>
            <p style="color: #cbd5e1;">Estimate calories burnt based on your physical attributes and exercise activity.</p>
          </div>

          <form id="exerciseForm">
            <div class="row">
              <div class="col-md-6 form-group">
                <label class="form-label">Gender</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-venus-mars"></i>
                  <select class="form-select" name="GENDER3" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="0">Male</option>
                    <option value="1">Female</option>
                  </select>
                </div>
              </div>
              <div class="col-md-6 form-group">
                <label class="form-label">Age</label>
                <div class="input-icon-wrapper">
                  <i class="fa-regular fa-id-card"></i>
                  <input type="number" class="form-control" name="AGE3" placeholder="Age in years" required />
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 form-group">
                <label class="form-label">Height (cm)</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-text-height"></i>
                  <input type="number" step="any" class="form-control" name="HEIGHT3" placeholder="e.g. 175" required />
                </div>
              </div>
              <div class="col-md-6 form-group">
                <label class="form-label">Weight (kg)</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-weight-scale"></i>
                  <input type="number" step="any" class="form-control" name="WEIGHT3" placeholder="e.g. 70" required />
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 form-group">
                <label class="form-label">Duration (min)</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-stopwatch"></i>
                  <input type="number" step="any" class="form-control" name="DUR3" placeholder="Exercise duration" required />
                </div>
              </div>
              <div class="col-md-6 form-group">
                <label class="form-label">Heart Rate (bpm)</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-heart-pulse"></i>
                  <input type="number" step="any" class="form-control" name="HR3" placeholder="e.g. 120" required />
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Body Temperature (&deg;C)</label>
              <div class="input-icon-wrapper">
                <i class="fa-solid fa-temperature-half"></i>
                <input type="number" step="any" class="form-control" name="BT3" placeholder="e.g. 37.5" required />
              </div>
            </div>

            <button type="submit" class="btn-primary mt-3" id="submitBtn">
              <i class="fa-solid fa-calculator me-2"></i> Calculate Calories
            </button>
          </form>

          <div id="resultBox"></div>

        </div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = 'https://prediction-models-g1sm.onrender.com';

    document.getElementById('exerciseForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const resultBox = document.getElementById('resultBox');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Calculating...';
      resultBox.innerHTML = '';

      const formData = new FormData(this);

      try {
        const response = await fetch(`${API_BASE}/e_predict`, {
          method: 'POST',
          body: formData
        });
        const data = await response.json();

        if (data.prediction_text) {
          resultBox.innerHTML = `
            <div class="prediction-result mt-4">
              <h3>${data.prediction_text}</h3>
            </div>`;
        } else if (data.error) {
          resultBox.innerHTML = `<div class="prediction-error mt-4"><h3>⚠️ ${data.error}</h3></div>`;
        }
      } catch (err) {
        resultBox.innerHTML = `<div class="prediction-error mt-4"><h3>⚠️ Could not reach the API. Please try again.</h3></div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-calculator me-2"></i> Calculate Calories';
      }
    });
  </script>

</body>
</html>
